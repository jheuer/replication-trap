<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .trap-bar { stroke: #1a1a2e; stroke-width: 5; stroke-linecap: round; }
      .trap-fill { fill: none; }
      .shadow { fill: rgba(0,0,0,0.08); }
      .title { font-family: Georgia, 'Times New Roman', serif; fill: #1a1a2e; }
      .subtitle { font-family: Georgia, 'Times New Roman', serif; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#fafaf8" rx="18"/>

  <!-- Subtle drop shadow for trap -->
  <ellipse cx="202" cy="310" rx="105" ry="10" fill="rgba(0,0,0,0.07)"/>

  <!-- ===== LOBSTER TRAP (wire cage) ===== -->
  <!-- Main body: trapezoidal frame -->
  <!-- Bottom rectangle -->
  <rect x="97" y="250" width="210" height="12" rx="4" fill="#2d4a7a" opacity="0.9"/>
  <!-- Top bar -->
  <rect x="115" y="108" width="175" height="10" rx="4" fill="#2d4a7a" opacity="0.9"/>

  <!-- Left slant side -->
  <line x1="97" y1="256" x2="115" y2="113" class="trap-bar" stroke="#2d4a7a"/>
  <!-- Right slant side -->
  <line x1="307" y1="256" x2="290" y2="113" class="trap-bar" stroke="#2d4a7a"/>

  <!-- Vertical bars (cage wires) -->
  <line x1="140" y1="113" x2="126" y2="256" class="trap-bar" stroke="#3a5f9a" opacity="0.75"/>
  <line x1="165" y1="113" x2="157" y2="256" class="trap-bar" stroke="#3a5f9a" opacity="0.75"/>
  <line x1="190" y1="113" x2="188" y2="256" class="trap-bar" stroke="#3a5f9a" opacity="0.75"/>
  <line x1="215" y1="113" x2="219" y2="256" class="trap-bar" stroke="#3a5f9a" opacity="0.75"/>
  <line x1="240" y1="113" x2="250" y2="256" class="trap-bar" stroke="#3a5f9a" opacity="0.75"/>
  <line x1="265" y1="113" x2="281" y2="256" class="trap-bar" stroke="#3a5f9a" opacity="0.75"/>

  <!-- Horizontal cross-bars -->
  <line x1="104" y1="183" x2="299" y2="183" class="trap-bar" stroke="#3a5f9a" opacity="0.6"/>
  <line x1="100" y1="220" x2="303" y2="220" class="trap-bar" stroke="#3a5f9a" opacity="0.55"/>
  <line x1="112" y1="145" x2="291" y2="145" class="trap-bar" stroke="#3a5f9a" opacity="0.55"/>

  <!-- Trap door / funnel opening (left side entrance, darker triangle) -->
  <polygon points="97,183 97,220 125,201" fill="#1a3a6a" opacity="0.5"/>
  <line x1="97" y1="183" x2="125" y2="201" class="trap-bar" stroke="#1a3a6a" opacity="0.8"/>
  <line x1="97" y1="220" x2="125" y2="201" class="trap-bar" stroke="#1a3a6a" opacity="0.8"/>

  <!-- ===== LOBSTER EMOJI (large, centered in trap) ===== -->
  <text x="202" y="218" text-anchor="middle" font-size="88" dominant-baseline="middle">🦞</text>

  <!-- ===== TITLE TEXT ===== -->
  <text x="200" y="338" text-anchor="middle" font-size="20" font-weight="bold" class="title" letter-spacing="0.5">The Replication Trap</text>
  <text x="200" y="362" text-anchor="middle" font-size="11.5" class="subtitle" letter-spacing="1.2">PRECISION FAILURES IN LLM SCRUTINY</text>
  <text x="200" y="380" text-anchor="middle" font-size="10.5" class="subtitle" fill="#888" letter-spacing="0.8">Claw4S Conference 2026</text>
</svg>
